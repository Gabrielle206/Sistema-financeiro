<ui:composition xmlns="http://www.w3.org/1999/xhtml" 
                xmlns:h="http://xmlns.jcp.org/jsf/html" 
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets" 
                xmlns:p="http://primefaces.org/ui" 
                xmlns:f="http://xmlns.jcp.org/jsf/core" 
                template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="titulo">Metas | Sistema Financeiro</ui:define>
    <ui:define name="header_titulo">Minhas Metas</ui:define>

    <ui:define name="conteudo">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Formulário de Nova Meta -->
            <div class="card-custom p-6 h-fit">
                <h3 class="text-lg font-semibold text-gray-700 mb-4">Definir Nova Meta</h3>
                <h:form id="formMeta">
                    <div class="space-y-4">
                        <div class="flex flex-col gap-2">
                            <p:outputLabel for="valor" value="Valor da Meta" />
                            <p:inputNumber id="valor" value="#{metaBean.meta.valorMeta}" symbol="R$ " required="true" class="w-full" />
                        </div>
                        <p:commandButton value="Salvar Meta" action="#{metaBean.salvar}" 
                                         update=":formListaMetas:dtMetas :messages" 
                                         styleClass="w-full ui-button-primary" />
                    </div>
                </h:form>
            </div>

            <!-- Lista de Metas -->
            <div class="lg:col-span-2 card-custom p-6">
                <h3 class="text-lg font-semibold text-gray-700 mb-4">Histórico de Metas</h3>
                <h:form id="formListaMetas">
                    <p:dataTable id="dtMetas" value="#{metaBean.listaMetas}" var="m" 
                                 emptyMessage="Nenhuma meta definida." class="w-full">
                        
                        <p:column headerText="Mês/Ano">
                            <h:outputText value="#{m.mesReferencia.monthValue}/#{m.mesReferencia.year}" />
                        </p:column>

                        <p:column headerText="Valor Alvo">
                            <h:outputText value="#{m.valorMeta}" class="font-bold text-indigo-600">
                                <f:convertNumber type="currency" currencySymbol="R$" />
                            </h:outputText>
                        </p:column>

                        <p:column headerText="Status">
                            <p:tag value="#{m.ativa ? 'Ativa' : 'Inativa'}" severity="#{m.ativa ? 'success' : 'warning'}" />
                        </p:column>
                    </p:dataTable>
                </h:form>
            </div>
        </div>
    </ui:define>
</ui:composition>
