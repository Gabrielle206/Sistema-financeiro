<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="titulo">Dashboard</ui:define>
    <ui:define name="header_titulo">Visão Geral das Finanças</ui:define>

    <ui:define name="conteudo">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="card-custom p-6 border-l-4 border-blue-500">
                <p class="text-sm font-medium text-slate-500 uppercase">Saldo Disponível</p>
                <h3 class="text-3xl font-bold text-slate-800">
                    <h:outputText value="#{dashboardBean.saldoTotal}">
                        <f:convertNumber type="currency" currencySymbol="R$" />
                    </h:outputText>
                </h3>
            </div>
            <div class="card-custom p-6 border-l-4 border-emerald-500">
                <p class="text-sm font-medium text-slate-500 uppercase text-emerald-600">Receitas do Mês</p>
                <h3 class="text-3xl font-bold text-slate-800">R$ 5.250,00</h3>
            </div>
            <div class="card-custom p-6 border-l-4 border-rose-500">
                <p class="text-sm font-medium text-slate-500 uppercase text-rose-600">Despesas do Mês</p>
                <h3 class="text-3xl font-bold text-slate-800">R$ 2.140,00</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="card-custom p-6">
                <h4 class="text-lg font-semibold mb-4 text-slate-700">Fluxo de Caixa</h4>
                <p:chart type="line" model="#{dashboardBean.graficoFluxo}" style="height:300px" />
            </div>
            <div class="card-custom p-6">
                <h4 class="text-lg font-semibold mb-4 text-slate-700">Movimentações Recentes</h4>
                <p:dataTable value="#{despesaBean.listaDespesas}" var="d" rows="5" styleClass="ui-datatable-borderless">
                    <p:column headerText="Descrição">#{d.descricao}</p:column>
                    <p:column headerText="Valor" textAlign="right">
                        <h:outputText value="#{d.valor}" styleClass="font-bold text-rose-500">
                            <f:convertNumber type="currency" currencySymbol="R$" />
                        </h:outputText>
                    </p:column>
                </p:dataTable>
            </div>
        </div>
    </ui:define>
</ui:composition>
