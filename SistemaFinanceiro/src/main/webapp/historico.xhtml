<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="titulo">Histórico | Sistema Financeiro</ui:define>
    <ui:define name="header_titulo">Histórico de Decisões</ui:define>

    <ui:define name="conteudo">
        <div class="card-custom p-6">
            <h:form id="formHistorico">
                <h3 class="text-lg font-semibold text-gray-700 mb-6">Registro de Atividades</h3>

                <p:dataTable id="dtHistorico" value="#{historicoDecisaoBean.listaHistorico}" var="h" 
                             emptyMessage="Nenhum registro no histórico."
                             paginator="true" rows="10" paginatorPosition="bottom"
                             class="w-full">
                    
                    <p:column headerText="Data/Hora" class="w-48">
                        <h:outputText value="#{h.data}">
                            <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm" />
                        </h:outputText>
                    </p:column>

                    <p:column headerText="Descrição">
                        <h:outputText value="#{h.descricao}" />
                    </p:column>

                    <p:column headerText="Tipo" class="w-32 text-center">
                        <p:tag value="Sistema" severity="info" />
                    </p:column>
                </p:dataTable>
            </h:form>
        </div>
    </ui:define>
</ui:composition>
