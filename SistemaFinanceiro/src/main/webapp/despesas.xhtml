<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="titulo">Despesas</ui:define>
    <ui:define name="header_titulo">Controle de Despesas</ui:define>

    <ui:define name="conteudo">
        <h:form id="formPrincipal">
            <div class="card-custom p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-bold text-slate-700">Histórico de Gastos</h3>
                    <p:commandButton value="Nova Despesa" icon="pi pi-plus" 
                                     oncomplete="PF('dlgDespesa').show()" 
                                     styleClass="ui-button-raised" update=":formDialog:painelDespesa" />
                </div>

                <p:dataTable id="tabelaDespesas" value="#{despesaBean.listaDespesas}" var="d" 
                             paginator="true" rows="10" paginatorPosition="bottom">
                    <p:column headerText="Data">
                        <h:outputText value="#{d.data}"><f:convertDateTime pattern="dd/MM/yyyy" /></h:outputText>
                    </p:column>
                    <p:column headerText="Descrição">#{d.descricao}</p:column>
                    <p:column headerText="Categoria">#{d.categoria.nome}</p:column>
                    <p:column headerText="Valor" textAlign="right">
                        <h:outputText value="#{d.valor}" styleClass="text-rose-600 font-bold">
                            <f:convertNumber type="currency" currencySymbol="R$" />
                        </h:outputText>
                    </p:column>
                    <p:column headerText="Ações" width="100" textAlign="center">
                        <p:commandButton icon="pi pi-pencil" oncomplete="PF('dlgDespesa').show()" update=":formDialog:painelDespesa" styleClass="ui-button-flat">
                            <f:setPropertyActionListener value="#{d}" target="#{despesaBean.despesa}" />
                        </p:commandButton>
                    </p:column>
                </p:dataTable>
            </div>
        </h:form>

        <p:dialog header="Detalhes da Despesa" widgetVar="dlgDespesa" modal="true" responsive="true" showEffect="fade">
            <h:form id="formDialog">
                <p:outputPanel id="painelDespesa" class="ui-fluid p-4">
                    <div class="space-y-4">
                        <div class="field">
                            <p:outputLabel for="desc" value="Descrição" />
                            <p:inputText id="desc" value="#{despesaBean.despesa.descricao}" required="true" />
                        </div>
                        <div class="field">
                            <p:outputLabel for="val" value="Valor" />
                            <p:inputNumber id="val" value="#{despesaBean.despesa.valor}" symbol="R$ " decimalSeparator="," thousandSeparator="." />
                        </div>
                        <div class="field">
                            <p:outputLabel for="cat" value="Categoria" />
                            <p:selectOneMenu id="cat" value="#{despesaBean.despesa.categoriaId}">
                                <f:selectItems value="#{categoriaDAO.listar()}" var="c" itemLabel="#{c.nome}" itemValue="#{c.id}" />
                            </p:selectOneMenu>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end gap-2">
                        <p:commandButton value="Salvar" action="#{despesaBean.salvar}" update=":formPrincipal:tabelaDespesas :messages" oncomplete="PF('dlgDespesa').hide()" styleClass="w-32" />
                        <p:commandButton value="Cancelar" onclick="PF('dlgDespesa').hide()" type="button" styleClass="ui-button-flat w-32" />
                    </div>
                </p:outputPanel>
            </h:form>
        </p:dialog>
    </ui:define>
</ui:composition>
